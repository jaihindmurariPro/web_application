<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Digital | Modern Experience</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="blob"></div>

    <nav class="glass-nav">
        <div class="logo">NEXUS<span>.</span></div>
        <ul class="nav-links">
            <li><a href="#home">Home</a></li>
            <li><a href="#work">Our Work</a></li>
            <li><a href="#services">Services</a></li>
        </ul>
        <button class="btn-contact" id="openModal">Get Started</button>
    </nav>

    <header id="home" class="hero section fade-in">
        <h1>Building Digital <span class="gradient-text">Masterpieces</span></h1>
        <p>Interactive, high-performance web experiences designed for the next generation of users.</p>
        <div class="hero-btns">
            <button class="primary-btn">Explore Portfolio</button>
            <button class="secondary-btn" id="theme-toggle">Change Vibe</button>
        </div>
    </header>

    <section id="work" class="section fade-in">
        <h2 class="section-title">Selected Projects</h2>
        <div class="grid">
            <div class="project-card">
                <div class="card-img"></div>
                <div class="card-info">
                    <h3>AI Dashboard</h3>
                    <p>Interface Design</p>
                </div>
            </div>
            <div class="project-card">
                <div class="card-img blue"></div>
                <div class="card-info">
                    <h3>Fintech App</h3>
                    <p>Mobile Solution</p>
                </div>
            </div>
        </div>
    </section>

    <div id="contactModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Let's Talk</h2>
            <form id="contactForm">
                <input type="text" placeholder="Name" required>
                <input type="email" placeholder="Email" required>
                <textarea placeholder="Tell us about your project"></textarea>
                <button type="submit" class="primary-btn">Send Proposal</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
