<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Pro | Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">Brand<span>Visual</span></div>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#features">Features</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
            <button id="theme-toggle">Toggle Dark Mode</button>
        </nav>
    </header>

    <section id="home" class="hero">
        <div class="hero-content">
            <h1>Design the Future</h1>
            <p>A fully responsive, interactive experience built with clean code.</p>
            <button class="btn-main" onclick="showAlert()">Get Started</button>
        </div>
    </section>

    <section id="features" class="features">
        <h2>Our Core Features</h2>
        <div class="card-container">
            <div class="card">
                <h3>Responsive</h3>
                <p>Looks great on mobile, tablet, and desktop.</p>
            </div>
            <div class="card">
                <h3>Interactive</h3>
                <p>JS-powered elements for a better UX.</p>
            </div>
        </div>
    </section>

    <section id="contact">
        <form id="contactForm">
            <h2>Connect With Us</h2>
            <input type="text" id="name" placeholder="Your Name" required>
            <input type="email" id="email" placeholder="Your Email" required>
            <textarea id="message" placeholder="Your Message"></textarea>
            <button type="submit">Send Message</button>
            <p id="form-status"></p>
        </form>
    </section>

    <script src="script.js"></script>
</body>
</html>
